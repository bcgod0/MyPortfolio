<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #00ff41;
    --green-dim: #00aa2a;
    --green-glow: rgba(0,255,65,0.15);
    --amber: #ffb000;
    --red: #ff3131;
    --cyan: #00ffff;
    --white: #e0e0e0;

  html, body {

    background: var(--bg);
    color: var(--green);
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    font-size: 14px;
    line-height: 1.6;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
    z-index: 9998;
  }

  #terminal {
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 20px;
    overflow: hidden;
  }

  #titlebar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(0,255,65,0.2);
    flex-shrink: 0;
  }

  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot.red { background: #ff5f57; }
  .dot.yellow { background: #febc2e; }
  .dot.green { background: #28c840; }

  #titlebar-text {
    margin-left: auto;
    margin-right: auto;
    color: var(--green-dim);
    font-size: 12px;
    letter-spacing: 2px;
  }

  #output {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding-right: 4px;
    scroll-behavior: smooth;
  }

  #output::-webkit-scrollbar { width: 4px; }
  #output::-webkit-scrollbar-track { background: transparent; }
  #output::-webkit-scrollbar-thumb { background: var(--green-dim); border-radius: 2px; }

  .line {
    white-space: pre-wrap;
    word-break: break-word;
    overflow-wrap: break-word;
    max-width: 100%;
    animation: fadeIn 0.05s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .prompt-line { color: var(--green); }
  .prompt-line .user { color: var(--cyan); }
  .prompt-line .at { color: var(--green-dim); }
  .prompt-line .host { color: var(--green); }
  .prompt-line .path { color: var(--amber); }
  .prompt-line .dollar { color: var(--white); }

  .output-text { color: #b0e0b0; margin-left: 0; }
  .error-text { color: var(--red); }
  .highlight { color: var(--cyan); }
  .amber { color: var(--amber); }
  .green-bright { color: var(--green); font-weight: 700; }
  .dim { color: #555; }
  .ascii-art { color: var(--green); line-height: 1.2; font-size: 12px; }
  .success { color: #00ff41; font-weight: 700; }
  .section-header { color: var(--amber); font-weight: 700; }

  a:hover { text-decoration: underline; color: #00ff41 !important; }

  #input-area {
    display: flex;
    align-items: center;
    gap: 0;
    margin-top: 8px;
    flex-shrink: 0;
    padding-top: 8px;
    border-top: 1px solid rgba(0,255,65,0.1);
  }

  #prompt-prefix {
    white-space: nowrap;
    flex-shrink: 0;
  }

  #cmd-input {
    background: transparent;
    border: none;
    outline: none;
    color: var(--white);
    font-family: inherit;
    font-size: inherit;
    flex: 1;
    caret-color: var(--green);
  }

  .glitch {
    position: relative;
    animation: glitch 4s infinite;
  }
  @keyframes glitch {
    0%,94%,96%,100% { text-shadow: none; }
    95% { text-shadow: -2px 0 var(--red), 2px 0 var(--cyan); }
  }

  #boot-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 9997;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: opacity 0.5s;
  }

  #boot-overlay.hide { opacity: 0; pointer-events: none; }

  .boot-line {
    color: var(--green-dim);
    font-size: 12px;
    opacity: 0;
    animation: bootAppear 0.1s forwards;
    text-align: left;
    width: 400px;
  }

  @keyframes bootAppear { to { opacity: 1; } }

  .progress-bar {
    width: 400px;
    height: 16px;
    border: 1px solid var(--green-dim);
    margin-top: 12px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--green);
    width: 0%;
    animation: fillBar 2s ease forwards;
    animation-delay: 0.8s;
    box-shadow: 0 0 10px var(--green);
  }

  @keyframes fillBar { to { width: 100%; } }
</style>
</head>

  output.scrollTop = output.scrollHeight;
}

function printBlank() { print('&nbsp;'); }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function printPrompt(cmd) {

}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function updatePrompt() {
  const fullPath = cwd.replace('~', '/home/visitor');
  promptPath.textContent = fullPath;

async function loadingBar(label, steps = 20, duration = 800) {
  const bar = document.createElement('div');
  bar.className = 'line output-text';
  output.appendChild(bar);
  output.scrollTop = output.scrollHeight;
  for (let i = 0; i <= steps; i++) {
    const pct = Math.round((i / steps) * 100);
    const filled = Math.round((i / steps) * 30);
    const empty = 30 - filled;
    bar.innerHTML = `${label} [<span class="green-bright">${'█'.repeat(filled)}${'░'.repeat(empty)}</span>] ${pct}%`;
    await sleep(duration / steps);
  }
}

  // ── SNAKE GAME ───────────────────────────────────────────────────────────

  snake: (() => {
    let gameLoop = null;
    let active = false;
    let snake, dir, nextDir, food, score, speed;
    const W = 20, H = 10; // grid size

    function randFood(sn) {
      let pos;
      do {
        pos = { x: Math.floor(Math.random()*W), y: Math.floor(Math.random()*H) };
      } while (sn.some(s => s.x === pos.x && s.y === pos.y));
      return pos;
    }

    function renderGrid() {
      // Remove old grid lines
      const lines = output.querySelectorAll('.snake-grid');
      lines.forEach(l => l.remove());

      const top    = '┌' + '─'.repeat(W*2) + '┐';
      const bottom = '└' + '─'.repeat(W*2) + '┘';

      function addLine(html) {
        const d = document.createElement('div');
        d.className = 'line snake-grid';
        d.innerHTML = html;
        output.appendChild(d);
      }

      addLine(`  <span class="dim">${top}</span>   <span class="section-header">SCORE: ${score}</span>  <span class="dim">Speed: ${speed}</span>`);

      for (let y = 0; y < H; y++) {
        let row = '│';
        for (let x = 0; x < W; x++) {
          const isHead = snake[0].x === x && snake[0].y === y;
          const isBody = snake.slice(1).some(s => s.x === x && s.y === y);
          const isFood = food.x === x && food.y === y;
          if (isHead)       row += '██';
          else if (isBody)  row += '░░';
          else if (isFood)  row += '##';
          else              row += '  ';
        }
        row += '│';
        let lineHtml = '  <span class="dim">│</span>';
        for (let x = 0; x < W; x++) {
          const isHead = snake[0].x === x && snake[0].y === y;
          const isBody = snake.slice(1).some(s => s.x === x && s.y === y);
          const isFood = food.x === x && food.y === y;
          if (isHead)       lineHtml += `<span class="green-bright">██</span>`;
          else if (isBody)  lineHtml += `<span class="success">░░</span>`;
          else if (isFood)  lineHtml += `<span class="error-text">##</span>`;
          else              lineHtml += '  ';
        }
        lineHtml += '<span class="dim">│</span>';
        addLine(lineHtml);
      }

      addLine(`  <span class="dim">${bottom}</span>   <span class="dim">WASD or arrow keys to move. 'snake stop' to quit.</span>`);
      output.scrollTop = output.scrollHeight;
    }

    function tick() {
      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      // wall collision
      if (head.x < 0 || head.x >= W || head.y < 0 || head.y >= H) {
        endGame('Hit the wall!'); return;
      }
      // self collision
      if (snake.some(s => s.x === head.x && s.y === head.y)) {
        endGame('Bit yourself!'); return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 10;
        speed = Math.max(1, Math.floor(score / 50));
        food = randFood(snake);
        clearInterval(gameLoop);
        gameLoop = setInterval(tick, Math.max(80, 300 - score * 2));
      } else {
        snake.pop();
      }

      renderGrid();
    }

    function endGame(reason) {
      clearInterval(gameLoop);
      gameLoop = null;
      active = false;

      // Remove grid
      output.querySelectorAll('.snake-grid').forEach(l => l.remove());

      printBlank();
      print(`  <span class="error-text">╔══════════════════════════════╗</span>`);
      print(`  <span class="error-text">║       GAME OVER 💀           ║</span>`);
      print(`  <span class="error-text">╚══════════════════════════════╝</span>`);
      print(`  <span class="output-text">Reason: <span class="amber">${reason}</span></span>`);
      print(`  <span class="output-text">Final Score: <span class="green-bright">${score}</span></span>`);
      printBlank();

      if (score >= 150 && !hiddenCommandsUnlocked) {
        hiddenCommandsUnlocked = true;
        print(`  <span class="success">╔══════════════════════════════════════════════════╗</span>`);
        print(`  <span class="success">║   🏆  ACHIEVEMENT UNLOCKED: SNAKE MASTER  🏆    ║</span>`);
        print(`  <span class="success">╠══════════════════════════════════════════════════╣</span>`);
        print(`  <span class="success">║  You scored ${String(score).padEnd(4)} — Hidden commands revealed!   ║</span>`);
        print(`  <span class="success">╚══════════════════════════════════════════════════╝</span>`);
        printBlank();
        print(`  <span class="section-header">SECRET COMMANDS UNLOCKED:</span>`);
        printBlank();
        const hiddenCmds = [
          ['joke',       'Hear a programmer joke'],
          ['matrix',     'Enter the Matrix (toggle)'],
          ['coffee',     'Brew a virtual coffee'],
          ['hack',       'Initiate a hack sequence'],
          ['sudo',       'Try to get root access'],
          ['nmap',       'Scan open ports'],
          ['banner',     'Show ASCII banner'],
          ['ping &lt;host&gt;', 'Ping a host'],
          ['uptime',     'Show system uptime'],
          ['date',       'Print current date'],
        ];
        hiddenCmds.forEach(([cmd, desc]) => {
          print(`    <span class="highlight" style="display:inline-block;width:180px">${cmd}</span><span class="output-text">${desc}</span>`);
        });
        printBlank();
        print(`  <span class="dim">These commands are now yours. Use them wisely.</span>`);
      } else if (score >= 150 && hiddenCommandsUnlocked) {
        print(`  <span class="dim">Hidden commands already unlocked! Keep grinding. 🐍</span>`);
      } else {
        print(`  <span class="dim">Score 150+ to unlock hidden commands...</span>`);
      }

      printBlank();
      print(`  <span class="dim">Type 'snake' to play again.</span>`);
      printBlank();
    }

    function startGame() {
      active = true;
      score = 0;
      speed = 1;
      snake = [
        { x: 5, y: 5 }, { x: 4, y: 5 }, { x: 3, y: 5 }
      ];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      food = randFood(snake);

      printBlank();
      print(`  <span class="green-bright">╔══════════════════════════════╗</span>`);
      print(`  <span class="green-bright">║         S N A K E            ║</span>`);
      print(`  <span class="green-bright">╚══════════════════════════════╝</span>`);
      printBlank();
      print(`  <span class="dim">██ = head   ░░ = body   <span class="error-text">##</span> = food</span>`);
      print(`  <span class="dim">Use W A S D or arrow keys to move.</span>`);
      print(`  <span class="dim">Type 'snake stop' to quit.</span>`);
      printBlank();

      renderGrid();
      gameLoop = setInterval(tick, 300);
    }

    // keyboard handler
    const keyHandler = (e) => {
      if (!active) return;
      const map = {
        'ArrowUp':    { x:0,  y:-1 },
        'ArrowDown':  { x:0,  y:1  },
        'ArrowLeft':  { x:-1, y:0  },
        'ArrowRight': { x:1,  y:0  },
        'w': { x:0,  y:-1 },
        's': { x:0,  y:1  },
        'a': { x:-1, y:0  },
        'd': { x:1,  y:0  },
        'W': { x:0,  y:-1 },
        'S': { x:0,  y:1  },
        'A': { x:-1, y:0  },
        'D': { x:1,  y:0  },
      };
      if (map[e.key]) {
        const nd = map[e.key];
        // prevent reversing
        if (nd.x !== -dir.x || nd.y !== -dir.y) {
          nextDir = nd;
        }
        e.preventDefault();
      }
    };
    document.addEventListener('keydown', keyHandler);

    const handler = function(args) {
      if (args[0] === 'stop') {
        if (active) endGame('You quit.');
        else print(`<span class="dim">No active game. Type 'snake' to start.</span>`);
        return;
      }
      if (active) {
        print(`<span class="amber">Game already running! Use WASD to play or type 'snake stop' to quit.</span>`);
        return;
      }
      startGame();
    };

    Object.defineProperty(handler, '_active', { get: () => active });
    return handler;
  })(),

};

// ── DISPATCH ─────────────────────────────────────────────────────────────────

async function run(raw) {
  const trimmed = raw.trim();
  if (!trimmed) return;

  if (securityChallenge) {
    securityChallenge = false;
    printPrompt(trimmed);
    if (trimmed.toLowerCase() === 'loop') {
      printBlank();
      print(`<span class="success">✓ ACCESS GRANTED — Welcome to the classified zone.</span>`);
      cwd = '~/.secret/.classified';
      updatePrompt();
    } else {
      printBlank();
      print(`<span class="error-text">✗ ACCESS DENIED — Incorrect answer.</span>`);
      print(`<span class="dim">The classified directory remains locked.</span>`);
    }
    printBlank();
    return;
  }

  history.push(trimmed);
  histIdx = history.length;
  printPrompt(trimmed);

  // If snake is active, block other commands (use snake stop to quit)
  if (COMMANDS.snake._active && trimmed.toLowerCase() !== 'snake stop') {
    print(`<span class="amber">Snake is running! Use WASD keys to play, or type 'snake stop' to quit.</span>`);
    return;
  }

  const parts = trimmed.split(/\s+/);
  const cmd = parts[0].toLowerCase();
  const args = parts.slice(1);

  if (COMMANDS[trimmed.toLowerCase()]) {
    await COMMANDS[trimmed.toLowerCase()](args);
    return;
  }

  if (COMMANDS[cmd]) {
    await COMMANDS[cmd](args);
    return;
  }

  print(`<span class="error-text">bash: ${escHtml(cmd)}: command not found</span>`);
  print(`<span class="dim">Type 'help' for available commands.</span>`);
}

// ── INPUT HANDLING ────────────────────────────────────────────────────────────

input.addEventListener('keydown', async (e) => {
  if (e.key === 'Enter') {
    const val = input.value;
    input.value = '';
    await run(val);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (histIdx > 0) { histIdx--; input.value = history[histIdx]; }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (histIdx < history.length - 1) { histIdx++; input.value = history[histIdx]; }
    else { histIdx = history.length; input.value = ''; }
  } else if (e.key === 'l' && e.ctrlKey) {
    e.preventDefault();
    output.innerHTML = '';
  } else if (e.key === 'Tab') {
    e.preventDefault();
    const partial = input.value.trim();
    const matches = Object.keys(COMMANDS).filter(c => c.startsWith(partial));
    if (matches.length === 1) input.value = matches[0];
    else if (matches.length > 1) print(`<span class="dim">${matches.join('  ')}</span>`);
  }
});

document.addEventListener('click', () => input.focus());
document.addEventListener('keydown', () => input.focus());
